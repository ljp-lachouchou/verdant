appId: com.agent.codex-agent
productName: Codex Agent
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - resources/**/*
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
