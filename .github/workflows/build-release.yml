name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3,node-pty
        continue-on-error: true
      
      - name: Build application
        run: npm run build
      
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Verdant-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Verdant ${{ github.ref_name }}
          body: |
            ## Verdant ${{ github.ref_name }}
            
            Multi-agent desktop AI assistant built with Electron + React.
            
            ### Downloads
            - **macOS**: Verdant-${{ github.ref_name }}-arm64.dmg or x64.dmg
            - **Windows**: Verdant-Setup-${{ github.ref_name }}.exe
            - **Linux**: Verdant-${{ github.ref_name }}.AppImage
            
            ### Quick Start
            1. Download and install for your platform
            2. Open Settings → enter your API Key
            3. (Optional) Configure Vibe Coding CLI tool
            4. Start chatting!
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
